{{- if .Values.gateway.enabled }}
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: BackendTrafficPolicy
metadata:
  name: {{ include "navigator.fullname" . }}-timeouts
  labels:
    {{- include "navigator.labels" . | nindent 4 }}
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: GRPCRoute
      name: {{ include "navigator.fullname" . }}-grpc
  timeout:
    http:
      # Disable the default 15s request timeout so long-lived gRPC
      # server-streaming calls (e.g. WatchSandbox) are not terminated.
      requestTimeout: "0s"
{{- end }}
