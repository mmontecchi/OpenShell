{{- if and .Values.gateway.enabled .Values.gateway.tls.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "navigator.fullname" . }}-gateway-pki
  labels:
    {{- include "navigator.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  template:
    metadata:
      labels:
        {{- include "navigator.labels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "navigator.fullname" . }}-gateway-pki
      restartPolicy: OnFailure
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: pki
          image: {{ .Values.gateway.tls.jobImage | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: NAMESPACE
              value: {{ .Release.Namespace | quote }}
            - name: SERVER_SECRET
              value: {{ .Values.gateway.tls.secretName | quote }}
            - name: CLIENT_CA_SECRET
              value: {{ .Values.gateway.tls.clientCaSecretName | quote }}
            - name: CLI_SECRET
              value: {{ .Values.gateway.tls.cliSecretName | quote }}
            - name: EXTRA_SANS
              value: {{ join "," (.Values.gateway.tls.extraSANs | default list) | quote }}
          command:
            - /bin/sh
            - -c
          args:
            - |
              set -eu

              existing=0
              for secret in "$SERVER_SECRET" "$CLIENT_CA_SECRET" "$CLI_SECRET"; do
                if kubectl get secret "$secret" -n "$NAMESPACE" >/dev/null 2>&1; then
                  existing=$((existing + 1))
                fi
              done

              if [ "$existing" -eq 3 ]; then
                echo "mTLS secrets already exist; skipping generation."
                exit 0
              fi

              if [ "$existing" -ne 0 ]; then
                echo "Some mTLS secrets already exist; delete existing secrets before regeneration." >&2
                exit 1
              fi

              workdir=$(mktemp -d)
              trap 'rm -rf "$workdir"' EXIT
              cd "$workdir"

              openssl req -x509 -sha256 -nodes -days 3650 -newkey rsa:2048 \
                -subj "/O=navigator/CN=navigator-ca" \
                -keyout ca.key -out ca.crt

              cat > server-ext.cnf <<EOF
              [req]
              distinguished_name = req_distinguished_name
              [req_distinguished_name]
              [v3_req]
              subjectAltName = @alt_names
              [alt_names]
              DNS.1 = navigator
              DNS.2 = navigator.${NAMESPACE}.svc
              DNS.3 = navigator.${NAMESPACE}.svc.cluster.local
              DNS.4 = localhost
              DNS.5 = host.docker.internal
              IP.1 = 127.0.0.1
              EOF

              # Append extra SANs from EXTRA_SANS env (comma-separated).
              # IP-like entries become IP.N, others become DNS.N.
              if [ -n "$EXTRA_SANS" ]; then
                dns_idx=6
                ip_idx=2
                IFS=','
                for san in $EXTRA_SANS; do
                  san=$(echo "$san" | xargs)
                  [ -z "$san" ] && continue
                  case "$san" in
                    [0-9]*.[0-9]*.[0-9]*.[0-9]*)
                      echo "              IP.${ip_idx} = ${san}" >> server-ext.cnf
                      ip_idx=$((ip_idx + 1))
                      ;;
                    *:*) # IPv6
                      echo "              IP.${ip_idx} = ${san}" >> server-ext.cnf
                      ip_idx=$((ip_idx + 1))
                      ;;
                    *)
                      echo "              DNS.${dns_idx} = ${san}" >> server-ext.cnf
                      dns_idx=$((dns_idx + 1))
                      ;;
                  esac
                done
                unset IFS
              fi

              openssl req -newkey rsa:2048 -nodes -keyout server.key -out server.csr \
                -subj "/CN=navigator"
              openssl x509 -req -days 3650 -CA ca.crt -CAkey ca.key -set_serial 01 \
                -in server.csr -out server.crt -extfile server-ext.cnf -extensions v3_req

              openssl req -newkey rsa:2048 -nodes -keyout client.key -out client.csr \
                -subj "/CN=navigator-cli"
              openssl x509 -req -days 3650 -CA ca.crt -CAkey ca.key -set_serial 02 \
                -in client.csr -out client.crt

              kubectl create secret tls "$SERVER_SECRET" \
                --cert=server.crt \
                --key=server.key \
                -n "$NAMESPACE" \
                --dry-run=client -o yaml | kubectl apply -f -

              kubectl create secret generic "$CLIENT_CA_SECRET" \
                --from-file=ca.crt=ca.crt \
                -n "$NAMESPACE" \
                --dry-run=client -o yaml | kubectl apply -f -

              kubectl create secret generic "$CLI_SECRET" \
                --from-file=tls.crt=client.crt \
                --from-file=tls.key=client.key \
                --from-file=ca.crt=ca.crt \
                -n "$NAMESPACE" \
                --dry-run=client -o yaml | kubectl apply -f -
{{- end }}
